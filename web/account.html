<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>账号设置 - AI 外卖助手</title>
  <link rel="stylesheet" href="/assets/app.css?v=20260301" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">AI 外卖助手</div>
      <button id="backHomeBtn" class="new-chat" type="button">返回首页</button>
      <button id="logoutBtn" class="new-chat secondary danger" type="button">退出登录</button>
    </aside>

    <main class="chat-area account-main">
      <header class="chat-header">账号设置</header>
      <section class="message-list">
        <div class="account-wrap">
          <section class="account-card">
            <h3>用户信息</h3>
            <div class="account-line">用户名：<span id="usernameText">-</span></div>
            <div class="account-line">用户ID：<span id="userIdText">-</span></div>
          </section>

          <section class="account-card">
            <h3>账号与偏好</h3>
            <div class="account-row">
              <button id="openPasswordModalBtn" class="primary-btn" type="button">修改密码</button>
              <button id="openPreferenceModalBtn" class="primary-btn" type="button">重新填写偏好问卷</button>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div id="passwordModal" class="pref-modal hidden">
    <div class="pref-panel">
      <h3>修改密码</h3>
      <div class="account-form">
        <input id="oldPassword" class="auth-input" type="password" placeholder="旧密码" />
        <input id="newPassword" class="auth-input" type="password" placeholder="新密码（至少6位）" />
        <input id="newPassword2" class="auth-input" type="password" placeholder="再次输入新密码" />
      </div>
      <div class="pref-actions">
        <button id="passwordCancelBtn" class="ghost-btn" type="button">取消</button>
        <button id="changePasswordBtn" class="primary-btn" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="accountPrefModal" class="pref-modal hidden">
    <div class="pref-panel">
      <h3>重新填写饮食偏好问卷</h3>
      <div id="prefQuestion" class="pref-question"></div>
      <div id="prefOptions" class="pref-options"></div>
      <div class="pref-actions">
        <button id="prefCancelBtn" class="ghost-btn" type="button">取消</button>
        <div class="account-row">
          <button id="prefPrevBtn" class="ghost-btn" type="button">上一步</button>
          <button id="prefNextBtn" class="primary-btn" type="button">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/assets/account.js?v=20260304"></script>
</body>
</html>

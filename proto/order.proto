syntax = "proto3";

package order;

option go_package = "meituan-ai-agent/proto/order";

service OrderService {
  rpc GetOrders(GetOrdersRequest) returns (OrdersResponse);
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrderDetail(GetOrderDetailRequest) returns (OrderDetailResponse);
}

message GetOrdersRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message OrdersResponse {
  repeated OrderInfo orders = 1;
  int32 total = 2;
}

message OrderInfo {
  int64 order_id = 1;
  int64 user_id = 2;
  int64 merchant_id = 3;
  string merchant_name = 4;
  repeated string dishes = 5;
  double total_price = 6;
  string order_time = 7;
  int32 status = 8;
}

message CreateOrderRequest {
  int64 user_id = 1;
  int64 merchant_id = 2;
  repeated DishItem dishes = 3;
  string address = 4;
}

message DishItem {
  int64 dish_id = 1;
  string dish_name = 2;
  int32 quantity = 3;
  double price = 4;
}

message OrderResponse {
  int32 code = 1;
  string message = 2;
  int64 order_id = 3;
}

message GetOrderDetailRequest {
  int64 order_id = 1;
}

message OrderDetailResponse {
  OrderInfo order = 1;
}
